<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas y Noticias - Observatorio Ciudadano</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .main-header {
            background: linear-gradient(135deg, #0f7e3f, #2cae43);
            color: #fff;
            text-align: left;
            padding: 18px 24px;
            border-bottom: 2px solid #0b5931;
        }
        .main-header h1 { margin: 0; font-size: 1.25rem; letter-spacing: 0.02rem; text-transform: none; font-weight: 700; display:flex; align-items:center; gap:10px; }
        .main-header p { margin: 6px 0 10px; opacity: 0.9; font-size:0.94rem; }
        .main-header .btn-submit {
            margin-top: 0;
            background: #fff;
            color: #0f7e3f;
            border: 1px solid #0f7e3f;
            box-shadow: none;
            text-transform: none;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 5px;
        }
        .news-feed { display: flex; flex-direction: column; gap: 14px; padding: 16px 20px 24px; background: #f2faf2; min-height: calc(100vh - 147px); }
        .news-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid rgba(34, 105, 68, 0.17);
            box-shadow: 0 2px 9px rgba(0,0,0,0.08);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            flex-wrap: wrap;
            border-left: 6px solid #4caf50;
        }
        .news-card:hover { transform: translateY(-3px); box-shadow: 0 10px 22px rgba(13,55,124,0.2); }
        .news-card.destacada { border-left-color: #d32f2f; }
        .card-content { display: flex; padding: 12px; }
        .card-thumbnail-btn { border: none; background: none; padding: 0; margin-right: 14px; cursor: pointer; }
        .card-thumbnail { width: 120px; height: 80px; background: #f5f5f5; border-radius: 6px; overflow: hidden; display:flex; align-items:center; justify-content:center; }
        .card-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .card-text { flex: 1; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; color: #333; }
        .card-summary { color: #666; font-size: 14px; line-height: 1.4; margin-bottom: 10px; }
        .card-meta { font-size: 12px; color: #999; display: flex; justify-content: space-between; }
        .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .new-badge { background: #f57c00; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-left: 5px; }
        .unread { border-left: 4px solid #f57c00 !important; }
        .detail-panel {
            position: fixed; top: 0; right: 0; width: 50%; height: 100%; background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.3s;
            z-index: 1000; overflow-y: auto; padding: 20px;
        }
        .detail-panel.open { transform: translateX(0); }
        .detail-header { position: sticky; top: 0; background: white; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        .detail-meta { color: #666; font-size: 14px; margin-bottom: 15px; }
        .detail-image { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; }
        .content-block { margin-bottom: 20px; }
        .content-block.texto { line-height: 1.6; }
        .content-block.imagen img { max-width: 100%; border-radius: 8px; }
        .content-block.link { background: #f9f9f9; padding: 15px; border-left: 4px solid #fbc02d; border-radius: 4px; }
        .content-block.separador { height: 1px; background: #eee; margin: 30px 0; }
        .close-detail { position: absolute; top: 10px; right: 10px; background: #333; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .loading { text-align: center; padding: 40px; }
        .no-news { text-align: center; padding: 40px; color: #666; }
        .filter-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: linear-gradient(135deg, #ffffff, #d8f3fc); border-bottom: 1px solid #a8d9ef; position: sticky; top: 0; z-index: 2; }
        .filter-bar label { font-weight: 700; color: #055a8c; }
        .filter-select { padding: 8px 12px; border: 1px solid #7ab5d6; border-radius: 6px; min-width: 210px; background: #fff; }
        .filter-select:focus { outline: none; border-color: #0584c9; box-shadow: 0 0 0 3px rgba(13, 122, 188, 0.2); }
        .detail-panel { background: linear-gradient(180deg, #f7fbff, #ffffff 32%); }
    </style>
</head>
<body>
    <header class="main-header" style="background: linear-gradient(135deg, #0f7e3f, #2cae43); color:#fff;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-newspaper" style="font-size:1.35rem;"></i>
                <h1 style="font-size:1.25rem; margin:0;">Noticias Nacionales</h1>
            </div>
            <a href="inicio.html" class="btn-submit" style="background:#fff;color:#0f7e3f;border:1px solid #fff;font-size:0.85rem;">Volver al Inicio</a>
        </div>
        <p style="margin: 8px 0 12px; color:rgba(255,255,255,0.92); font-weight:600;">Información oficial y verificada del distrito.</p>
    </header>

    <div class="filter-bar">
        <div>
            <label for="categoriaFilter">Filtrar por categoría:</label>
            <select id="categoriaFilter" class="filter-select">
                <option value="">Todas</option>
                <option value="seguridad">Seguridad</option>
                <option value="infraestructura">Infraestructura</option>
                <option value="medioambiente">Medio Ambiente</option>
                <option value="gobierno">Gobierno</option>
                <option value="otro">Otro</option>
            </select>
        </div>
        <div>
            <label for="querySearch">Buscar:</label>
            <input id="querySearch" class="filter-select" style="width:320px;" type="search" placeholder="Buscar por título, resumen o tags...">
        </div>
    </div>

    <main class="news-feed" id="newsFeed">
        <div class="loading">Cargando noticias...</div>
    </main>

    <div class="detail-panel" id="detailPanel">
        <button class="close-detail" onclick="closeDetail()">&times;</button>
        <div id="detailContent"></div>
    </div>

    <script>
        let noticias = [];
        let currentDetail = null;
        let readNews = JSON.parse(localStorage.getItem('readNews') || '[]');

        async function loadNoticias() {
            try {
                const categoria = document.getElementById('categoriaFilter').value;
                const url = categoria ? `/api/noticias?categoria=${categoria}` : '/api/noticias';
                const response = await fetch(url);
                noticias = await response.json();
                noticias.sort((a, b) => {
                    const da = new Date(a.fechaPublicacion || a.creadoEn || a.updatedAt).getTime();
                    const db = new Date(b.fechaPublicacion || b.creadoEn || b.updatedAt).getTime();
                    const prioridadScore = (val) => val === 'destacada' ? 10 : 0;
                    const p = (prioridadScore(b.prioridad) - prioridadScore(a.prioridad));
                    if (p !== 0) return p;
                    return db - da;
                });
                renderFeed();
            } catch (error) {
                console.error('Error cargando noticias:', error);
                document.getElementById('newsFeed').innerHTML = '<div class="no-news">Error al cargar las noticias</div>';
            }
        }

        function renderFeed() {
            const feed = document.getElementById('newsFeed');
            const query = (document.getElementById('querySearch').value || '').trim().toLowerCase();
            let filtered = noticias;
            if (query) {
                filtered = noticias.filter(noticia => {
                    const haystack = `${noticia.titulo} ${noticia.resumen} ${noticia.tags.join(' ')}`.toLowerCase();
                    return haystack.includes(query);
                });
            }

            if (filtered.length === 0) {
                feed.innerHTML = '<div class="no-news">No se encontraron resultados</div>';
                return;
            }
            feed.innerHTML = filtered.map(noticia => {
                const isRead = readNews.includes(noticia._id);
                return `
                <div class="news-card ${noticia.prioridad === 'destacada' ? 'destacada' : ''} ${isRead ? 'read' : 'unread'}" onclick="openDetail('${noticia._id}')">
                        <div class="card-content">
                        <button class="card-thumbnail-btn" onclick="openDetail('${noticia._id}')" aria-label="Ver detalle">
                            <div class="card-thumbnail">
                                ${noticia.imagenPrincipal ? `<img src="${noticia.imagenPrincipal}" alt="${noticia.titulo}">` : '<i class="fas fa-newspaper fa-2x" style="color: #ccc; margin: 20px;"></i>'}
                            </div>
                        </button>
                        <div class="card-text" onclick="openDetail('${noticia._id}')" style="cursor:pointer;">
                            <div class="card-title">${noticia.titulo} ${!isRead ? '<span class="new-badge">NUEVO</span>' : ''}</div>
                            <div class="card-summary">${noticia.resumen}</div>
                            <div class="card-meta">
                                <span>${new Date(noticia.fechaPublicacion || noticia.creadoEn).toLocaleDateString()}</span>
                                <div class="card-tags">
                                    ${noticia.tags.slice(0, 3).map(tag => `<span class="tag">${tag}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function openDetail(id) {
            const noticia = noticias.find(n => n._id === id);
            if (!noticia) return;

            currentDetail = noticia;
            if (!readNews.includes(id)) {
                readNews.push(id);
                localStorage.setItem('readNews', JSON.stringify(readNews));
                renderFeed(); // update UI
            }
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('detailContent');

            content.innerHTML = `
                <div class="detail-header">
                    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
                        <div>
                            <h1 class="detail-title" style="margin:0;">${noticia.titulo}</h1>
                            <div class="detail-meta" style="margin-top:4px;">${new Date(noticia.fechaPublicacion || noticia.creadoEn).toLocaleDateString()} ${noticia.tags.length ? ` • ${noticia.tags.join(', ')}` : ''}</div>
                        </div>
                        <button class="btn btn-secondary" onclick="closeDetail()" style="padding:5px 10px; font-size:0.82rem;">Volver</button>
                    </div>
                </div>
                ${noticia.imagenPrincipal ? `<img src="${noticia.imagenPrincipal}" alt="${noticia.titulo}" class="detail-image">` : ''}
                <div class="detail-body">
                    ${noticia.contenido.map(block => {
                        switch(block.tipo) {
                            case 'texto':
                                return `<div class="content-block texto">${block.contenido}</div>`;
                            case 'imagen':
                                return `<div class="content-block imagen"><img src="${block.contenido}" alt="${block.alt || ''}"></div>`;
                            case 'link':
                                return `<div class="content-block link"><a href="${block.contenido}" target="_blank">${block.tituloLink || block.contenido}</a></div>`;
                            case 'separador':
                                return `<div class="content-block separador"></div>`;
                            default:
                                return '';
                        }
                    }).join('')}
                </div>
            `;

            panel.classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            currentDetail = null;
        }

        // Event listeners
        document.getElementById('categoriaFilter').addEventListener('change', loadNoticias);
        document.getElementById('querySearch').addEventListener('input', renderFeed);

        // Close detail on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetail();
        });

        // Load initial data
        loadNoticias();
    </script>
</body>
</html>
