<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas y Noticias - Observatorio Ciudadano</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .main-header {
            background: linear-gradient(135deg, #2c3e50 0%, #096dce 40%, #1abc9c 100%);
            color: #fff;
            text-align: center;
            padding: 25px 20px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.25);
        }
        .main-header h1 { margin: 0; font-size: 2.1rem; letter-spacing: 0.08rem; text-transform: uppercase; }
        .main-header p { margin: 6px 0 12px; opacity: 0.85; }
        .main-header .btn-submit {
            margin-top: 6px;
            background: #ffeb3b;
            color: #222;
            border: none;
            box-shadow: 0 2px 7px rgba(0,0,0,0.18);
            text-transform: uppercase;
            font-weight: 700;
        }
        .news-feed { display: flex; flex-direction: column; gap: 18px; padding: 18px 20px 28px; background: #f5fbff; min-height: calc(100vh - 164px); }
        .news-card {
            background: linear-gradient(135deg, #ffffff, #f7fcff);
            border-radius: 12px;
            border: 1px solid rgba(29, 110, 210, 0.16);
            box-shadow: 0 6px 18px rgba(13, 55, 124, 0.1);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            display: flex;
            flex-wrap: wrap;
            border-left: 6px solid #0984e3;
        }
        .news-card:hover { transform: translateY(-3px); box-shadow: 0 10px 22px rgba(13,55,124,0.2); }
        .news-card.destacada { border-left-color: #d32f2f; }
        .card-content { display: flex; padding: 15px; }
        .card-thumbnail { width: 120px; height: 80px; background: #f5f5f5; border-radius: 4px; margin-right: 15px; overflow: hidden; }
        .card-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .card-text { flex: 1; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; color: #333; }
        .card-summary { color: #666; font-size: 14px; line-height: 1.4; margin-bottom: 10px; }
        .card-meta { font-size: 12px; color: #999; display: flex; justify-content: space-between; }
        .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .new-badge { background: #f57c00; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-left: 5px; }
        .unread { border-left: 4px solid #f57c00 !important; }
        .detail-panel {
            position: fixed; top: 0; right: 0; width: 50%; height: 100%; background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.3s;
            z-index: 1000; overflow-y: auto; padding: 20px;
        }
        .detail-panel.open { transform: translateX(0); }
        .detail-header { position: sticky; top: 0; background: white; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        .detail-meta { color: #666; font-size: 14px; margin-bottom: 15px; }
        .detail-image { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; }
        .content-block { margin-bottom: 20px; }
        .content-block.texto { line-height: 1.6; }
        .content-block.imagen img { max-width: 100%; border-radius: 8px; }
        .content-block.link { background: #f9f9f9; padding: 15px; border-left: 4px solid #fbc02d; border-radius: 4px; }
        .content-block.separador { height: 1px; background: #eee; margin: 30px 0; }
        .close-detail { position: absolute; top: 10px; right: 10px; background: #333; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .loading { text-align: center; padding: 40px; }
        .no-news { text-align: center; padding: 40px; color: #666; }
        .filter-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: linear-gradient(135deg, #ffffff, #d8f3fc); border-bottom: 1px solid #a8d9ef; position: sticky; top: 0; z-index: 2; }
        .filter-bar label { font-weight: 700; color: #055a8c; }
        .filter-select { padding: 8px 12px; border: 1px solid #7ab5d6; border-radius: 6px; min-width: 210px; background: #fff; }
        .filter-select:focus { outline: none; border-color: #0584c9; box-shadow: 0 0 0 3px rgba(13, 122, 188, 0.2); }
        .detail-panel { background: linear-gradient(180deg, #f7fbff, #ffffff 32%); }
    </style>
</head>
<body>
    <header class="main-header">
        <h1>Alertas y Noticias</h1>
        <p>Información actualizada del distrito</p>
        <a href="inicio.html" class="btn-submit">Volver al Inicio</a>
    </header>

    <div class="filter-bar">
        <label>Filtrar por categoría: </label>
        <select id="categoriaFilter" class="filter-select">
            <option value="">Todas</option>
            <option value="seguridad">Seguridad</option>
            <option value="infraestructura">Infraestructura</option>
            <option value="medioambiente">Medio Ambiente</option>
            <option value="gobierno">Gobierno</option>
            <option value="otro">Otro</option>
        </select>
    </div>

    <main class="news-feed" id="newsFeed">
        <div class="loading">Cargando noticias...</div>
    </main>

    <div class="detail-panel" id="detailPanel">
        <button class="close-detail" onclick="closeDetail()">&times;</button>
        <div id="detailContent"></div>
    </div>

    <script>
        let noticias = [];
        let currentDetail = null;
        let readNews = JSON.parse(localStorage.getItem('readNews') || '[]');

        async function loadNoticias() {
            try {
                const categoria = document.getElementById('categoriaFilter').value;
                const url = categoria ? `/api/noticias?categoria=${categoria}` : '/api/noticias';
                const response = await fetch(url);
                noticias = await response.json();
                renderFeed();
            } catch (error) {
                console.error('Error cargando noticias:', error);
                document.getElementById('newsFeed').innerHTML = '<div class="no-news">Error al cargar las noticias</div>';
            }
        }

        function renderFeed() {
            const feed = document.getElementById('newsFeed');
            if (noticias.length === 0) {
                feed.innerHTML = '<div class="no-news">No hay noticias publicadas</div>';
                return;
            }
            feed.innerHTML = noticias.map(noticia => {
                const isRead = readNews.includes(noticia._id);
                return `
                <div class="news-card ${noticia.prioridad === 'destacada' ? 'destacada' : ''} ${isRead ? 'read' : 'unread'}" onclick="openDetail('${noticia._id}')">
                    <div class="card-content">
                        <div class="card-thumbnail">
                            ${noticia.imagenPrincipal ? `<img src="${noticia.imagenPrincipal}" alt="${noticia.titulo}">` : '<i class="fas fa-newspaper fa-2x" style="color: #ccc; margin: 20px;"></i>'}
                        </div>
                        <div class="card-text">
                            <div class="card-title">${noticia.titulo} ${!isRead ? '<span class="new-badge">NUEVO</span>' : ''}</div>
                            <div class="card-summary">${noticia.resumen}</div>
                            <div class="card-meta">
                                <span>${new Date(noticia.fechaPublicacion || noticia.creadoEn).toLocaleDateString()}</span>
                                <div class="card-tags">
                                    ${noticia.tags.slice(0, 3).map(tag => `<span class="tag">${tag}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function openDetail(id) {
            const noticia = noticias.find(n => n._id === id);
            if (!noticia) return;

            currentDetail = noticia;
            if (!readNews.includes(id)) {
                readNews.push(id);
                localStorage.setItem('readNews', JSON.stringify(readNews));
                renderFeed(); // update UI
            }
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('detailContent');

            content.innerHTML = `
                <div class="detail-header">
                    <h1 class="detail-title">${noticia.titulo}</h1>
                    <div class="detail-meta">
                        ${noticia.autor ? `Por ${noticia.autor.nombre} • ` : ''}${new Date(noticia.fechaPublicacion || noticia.creadoEn).toLocaleDateString()}
                        ${noticia.tags.length ? ` • ${noticia.tags.join(', ')}` : ''}
                    </div>
                </div>
                ${noticia.imagenPrincipal ? `<img src="${noticia.imagenPrincipal}" alt="${noticia.titulo}" class="detail-image">` : ''}
                <div class="detail-body">
                    ${noticia.contenido.map(block => {
                        switch(block.tipo) {
                            case 'texto':
                                return `<div class="content-block texto">${block.contenido}</div>`;
                            case 'imagen':
                                return `<div class="content-block imagen"><img src="${block.contenido}" alt="${block.alt || ''}"></div>`;
                            case 'link':
                                return `<div class="content-block link"><a href="${block.contenido}" target="_blank">${block.tituloLink || block.contenido}</a></div>`;
                            case 'separador':
                                return `<div class="content-block separador"></div>`;
                            default:
                                return '';
                        }
                    }).join('')}
                </div>
            `;

            panel.classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            currentDetail = null;
        }

        // Event listeners
        document.getElementById('categoriaFilter').addEventListener('change', loadNoticias);

        // Close detail on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetail();
        });

        // Load initial data
        loadNoticias();
    </script>
</body>
</html>
